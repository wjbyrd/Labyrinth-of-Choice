<!DOCTYPE html>
<html>
<head>
<title>Midterm Maze</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

#gameBox{
width:750px;
margin:auto;
margin-top:40px;
padding:25px;
background:#1a1a1a;
border-radius:12px;
}

button{
padding:10px 20px;
margin:8px;
font-size:16px;
cursor:pointer;
}

#progressBar{
width:100%;
background:#333;
height:20px;
border-radius:10px;
margin-bottom:15px;
}

#progressFill{
height:100%;
width:0%;
background:#4CAF50;
border-radius:10px;
}

.boss{
color:#ffcc00;
font-weight:bold;
font-size:20px;
}

</style>
</head>

<body>

<div id="gameBox">

<h2>Midterm Maze</h2>

<div id="progressBar">
<div id="progressFill"></div>
</div>

<p id="roomDisplay"></p>
<p id="question"></p>

<div id="answers"></div>

<p id="message"></p>

</div>

<script>

let room = 1

const questionBanks = {

easy:[
{q:"If price rises, quantity demanded usually...",options:["Falls","Rises","No change","Doubles"],a:0},
{q:"Demand curves slope...",options:["Up","Down","Flat","Vertical"],a:1},
{q:"Opportunity cost means...",options:["Lost alternative","Money price","Profit","Demand shift"],a:0}
],

medium:[
{q:"Inferior goods experience...",options:["Demand falls when income rises","Demand rises when income rises","No change","Perfect elasticity"],a:0},
{q:"Elastic demand means...",options:["Quantity very responsive to price","Quantity unresponsive","Supply shifts","Price fixed"],a:0}
],

hard:[
{q:"If demand is elastic and price rises...",options:["Revenue rises","Revenue falls","No effect","Revenue doubles"],a:1},
{q:"Marginal cost intersects average cost at...",options:["Minimum AC","Maximum AC","Demand curve","Profit"],a:0}
],

easyBoss:[
{q:"A binding price ceiling causes...",options:["Shortage","Surplus","No effect","Higher equilibrium"],a:0}
],

mediumBoss:[
{q:"Cross-price elasticity > 0 means goods are...",options:["Substitutes","Complements","Inferior","Giffen"],a:0}
],

finalBoss:[
{q:"Profit maximization occurs when...",options:["MR = MC","MR = Demand","MC = AC","TR = TC"],a:0}
]

}

function difficulty(){

if(room<=9) return "easy"
if(room==10) return "easyBoss"
if(room<=19) return "medium"
if(room==20) return "mediumBoss"
if(room<=29) return "hard"
return "finalBoss"

}

function randomQuestion(set){

return set[Math.floor(Math.random()*set.length)]

}

function updateProgress(){

let percent=(room-1)/30*100
document.getElementById("progressFill").style.width=percent+"%"

}

function loadQuestion(){

updateProgress()

let diff=difficulty()

let q=randomQuestion(questionBanks[diff])

currentQuestion=q

document.getElementById("roomDisplay").innerText="Room "+room+" of 30"

if(diff.includes("Boss")){
document.getElementById("question").innerHTML='<span class="boss">BOSS ROOM</span><br>'+q.q
}else{
document.getElementById("question").innerText=q.q
}

let html=""

q.options.forEach((opt,i)=>{
html+=`<button onclick="answer(${i})">${opt}</button>`
})

document.getElementById("answers").innerHTML=html

}

function answer(choice){

let diff=difficulty()

if(choice===currentQuestion.a){

document.getElementById("message").innerText="Correct!"

room++

if(room>30){
document.getElementById("question").innerHTML="<h2>You escaped the maze!</h2>"
document.getElementById("answers").innerHTML=""
document.getElementById("message").innerText=""
return
}

}else{

let setback=0

if(diff==="easy") setback=3
if(diff==="medium") setback=4
if(diff==="hard") setback=5
if(diff==="easyBoss") setback=3
if(diff==="mediumBoss") setback=5
if(diff==="finalBoss") setback=7

room=Math.max(1,room-setback)

document.getElementById("message").innerText="Wrong! You fell back "+setback+" rooms."

}

loadQuestion()

}

loadQuestion()

</script>

</body>
</html>
